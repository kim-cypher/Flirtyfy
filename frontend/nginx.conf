# Internal nginx — only reached via the HOST nginx proxy (which owns TLS and
# routes /api/, /admin/, /static/ straight to the backend container). This
# config only needs to serve static files and fall back to index.html so
# React Router's client-side routes (e.g. /subscribe, /dashboard) don't 404
# on a hard refresh.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
