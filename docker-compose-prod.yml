# Production stack — single-instance, reconstructed to match the live setup.
#
# Design notes (why it looks like this):
#  - db and redis publish NO host ports: this VPS runs other apps that already
#    own 5432 and 6379, so publishing here caused "port already allocated".
#    The backend/celery reach them over the internal network by service name.
#  - The backend talks straight to Postgres (db:5432) — no pgbouncer — because
#    the pgbouncer image on this box was unreliable. Postgres handles the
#    worker count directly.
#  - postgres_data / redis_data are declared `external` and pinned to their
#    real names so `up` REUSES your existing data (never creates empty ones).
#  - Secrets (SECRET_KEY, ANTHROPIC_API_KEY, DB_PASSWORD, DATABASE_URL, …) live
#    in ./.env on the VPS (gitignored). See the cutover steps for creating it.
#  - The host nginx (with the real TLS cert) proxies the public domain to the
#    127.0.0.1 ports below; these containers are not exposed to the internet.
name: flirtyfy

services:
  db:
    image: ankane/pgvector:latest
    container_name: flirty-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flirty
      POSTGRES_USER: flirty
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [flirty_network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flirty"]
      interval: 5s
      retries: 5
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: flirty-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [flirty_network]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: flirtyfy-backend
    container_name: flirty-backend
    restart: unless-stopped
    # Uses the gunicorn CMD baked into backend/Dockerfile (3 workers x 8 threads).
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8095:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [flirty_network]

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: flirtyfy-celery-worker
    container_name: flirty-celery
    restart: unless-stopped
    command: celery -A flirty_backend.celery:app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100 --time-limit=300
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [flirty_network]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: flirtyfy-frontend
    container_name: flirty-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:3000"
    networks: [flirty_network]

volumes:
  postgres_data:
    external: true
    name: flirtyfy_postgres_data
  redis_data:
    external: true
    name: flirtyfy_redis_data

networks:
  flirty_network:
    driver: bridge
