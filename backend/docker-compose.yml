services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: flirty
      POSTGRES_USER: flirty
      POSTGRES_PASSWORD: flirty
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flirty"]
      interval: 5s
      retries: 5
      timeout: 5s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 5s

  backend:
    build: .
    command: gunicorn flirty_backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: flirty_backend.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery:
    build: .
    command: celery -A flirty_backend.celery:app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: flirty_backend.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    command: yarn start
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: http://backend:8000/api
