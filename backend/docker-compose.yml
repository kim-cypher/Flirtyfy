version: '3.8'
services:
  db:
    image: ankane/pgvector
    environment:
      POSTGRES_DB: flirty
      POSTGRES_USER: flirty
      POSTGRES_PASSWORD: flirty
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  backend:
    build: .
    command: bash -c "python manage.py migrate && celery -A flirty_backend worker --detach && gunicorn flirty_backend.wsgi:application --bind 0.0.0.0:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=flirty_backend.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=0
    depends_on:
      - db
      - redis
    ports: ["8000:8000"]
